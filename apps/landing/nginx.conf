server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    text/xml
    application/xml;
  gzip_min_length 512;

  # Long cache for hashed assets — Astro emits content-hashed filenames under /_astro/.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short cache for HTML entry points so deploys propagate quickly.
  location = /            { expires 5m; }
  location = /privacy     { expires 5m; }
  location = /privacy/    { expires 5m; }
  location = /terms       { expires 5m; }
  location = /terms/      { expires 5m; }

  # Static multi-page site (NOT an SPA). Fallback is 404, NOT /index.html —
  # an index fallback would serve the homepage for every unknown URL and
  # tank SEO.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # Security headers (applied to every response)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
