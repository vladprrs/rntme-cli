server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
  gzip_min_length 512;

  # Long cache for Astro's content-hashed assets under /_astro/.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Static multi-page site. Fallback is 404, NOT /index.html — an index
  # fallback would serve the homepage for every unknown URL and tank SEO.
  # Per-route short-cache for HTML is set via $uri match below via map.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
